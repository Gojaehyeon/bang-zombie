<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>빵! 좀비 — Bang Zombie</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #eee;
        font-family: -apple-system, system-ui, sans-serif;
        overflow: hidden;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #video {
        display: none;
      }
      #canvas {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: #000;
      }
      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        font-size: 14px;
        background: rgba(0,0,0,0.6);
        padding: 8px 12px;
        border-radius: 6px;
        line-height: 1.5;
        pointer-events: none;
      }
      #error {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.85);
        padding: 24px;
        text-align: center;
      }
      #error.show { display: flex; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="canvas"></canvas>
    </div>
    <div id="status">로딩 중…</div>
    <div id="error"><div id="error-msg"></div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
